name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: jira
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: jira
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: jira
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: jira.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          artifact_dir="jira-cli-${version}-${{ matrix.target }}"
          mkdir -p "dist/${artifact_dir}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${artifact_dir}/jira"
          cp README.md LICENSE "dist/${artifact_dir}/"
          tar -C dist -czf "dist/${artifact_dir}.tar.gz" "${artifact_dir}"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $artifactDir = "jira-cli-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$artifactDir" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$artifactDir/jira.exe"
          Copy-Item README.md, LICENSE "dist/$artifactDir/"
          Compress-Archive -Path "dist/$artifactDir/*" -DestinationPath "dist/$artifactDir.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.${{ matrix.archive_ext }}

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
