name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: jira
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: jira
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: jira
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: jira.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          artifact_dir="jira-cli-${version}-${{ matrix.target }}"
          mkdir -p "dist/${artifact_dir}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${artifact_dir}/jira"
          cp README.md LICENSE "dist/${artifact_dir}/"
          tar -C dist -czf "dist/${artifact_dir}.tar.gz" "${artifact_dir}"

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $artifactDir = "jira-cli-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$artifactDir" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$artifactDir/jira.exe"
          Copy-Item README.md, LICENSE "dist/$artifactDir/"
          Compress-Archive -Path "dist/$artifactDir/*" -DestinationPath "dist/$artifactDir.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.${{ matrix.archive_ext }}

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Require tap push token
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update Rana-Faraz/homebrew-tap." >&2
            exit 1
          fi

      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Render Homebrew formula
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          macos_arm_sha="$(sha256sum "dist/jira-cli-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz" | awk '{print $1}')"
          macos_intel_sha="$(sha256sum "dist/jira-cli-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz" | awk '{print $1}')"
          linux_sha="$(sha256sum "dist/jira-cli-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" | awk '{print $1}')"
          mkdir -p rendered
          sh scripts/render-homebrew-formula.sh "$version" "$macos_arm_sha" "$macos_intel_sha" "$linux_sha" > rendered/jira-cli.rb

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Rana-Faraz/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula file
        shell: bash
        run: |
          set -euo pipefail
          cp rendered/jira-cli.rb homebrew-tap/Formula/jira-cli.rb

      - name: Commit and push formula
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/jira-cli.rb; then
            echo "Formula already matches ${GITHUB_REF_NAME}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/jira-cli.rb
          git commit -m "Update jira-cli to ${GITHUB_REF_NAME#v}"
          git push
